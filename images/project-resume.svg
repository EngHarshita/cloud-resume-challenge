<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Cloud Infrastructure Network lines -->
  <path d="M 120,200 L 220,130 L 320,130 L 480,200" fill="none" stroke="rgba(56, 189, 248, 0.1)" stroke-width="3" stroke-dasharray="5 5"/>
  <path d="M 220,130 L 220,240 Q 220,270 300,270" fill="none" stroke="rgba(99, 102, 241, 0.1)" stroke-width="3" stroke-dasharray="5 5"/>

  <!-- Browser Resume Frame (Left Side) -->
  <g transform="translate(60, 110)" filter="url(#shadow)">
    <rect width="180" height="210" rx="8" fill="#1E293B" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5"/>
    <path d="M 0,25 L 180,25" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5"/>
    <circle cx="15" cy="12" r="4" fill="#EF4444"/>
    <circle cx="27" cy="12" r="4" fill="#F59E0B"/>
    <circle cx="39" cy="12" r="4" fill="#10B981"/>
    
    <!-- Resume content mock -->
    <rect x="20" y="45" width="40" height="40" rx="20" fill="#38BDF8" opacity="0.3"/>
    <rect x="75" y="50" width="85" height="10" rx="2" fill="#E2E8F0"/>
    <rect x="75" y="68" width="60" height="8" rx="2" fill="#94A3B8"/>
    
    <line x1="20" y1="105" x2="160" y2="105" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <rect x="20" y="120" width="140" height="8" rx="2" fill="#334155"/>
    <rect x="20" y="135" width="120" height="8" rx="2" fill="#334155"/>
    <rect x="20" y="150" width="130" height="8" rx="2" fill="#334155"/>

    <g transform="translate(45, 175)">
      <rect width="90" height="20" rx="10" fill="url(#cloudGrad)" opacity="0.8"/>
      <text x="45" y="13" fill="#FFFFFF" font-family="Poppins, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">ACTIVE DEPLOY</text>
    </g>
  </g>

  <!-- AWS Core (Right Side) -->
  <g transform="translate(340, 90)" filter="url(#shadow)">
    <!-- Main Cloud Shape -->
    <path d="M 50,110 A 40,40 0 0,1 80,50 A 60,60 0 0,1 180,40 A 50,50 0 0,1 220,90 A 40,40 0 0,1 210,140 A 30,30 0 0,1 180,150 L 60,150 A 40,40 0 0,1 50,110 Z" fill="url(#cloudGrad)" opacity="0.85"/>
    
    <!-- AWS Logos / badges inside or near Cloud -->
    <!-- S3 Icon -->
    <g transform="translate(90, 80)">
      <rect width="32" height="32" rx="6" fill="#1E293B" stroke="#FF9900" stroke-width="1.5"/>
      <!-- S3 bucket representation -->
      <path d="M 8,10 L 24,10 L 24,24 A 2,2 0 0 1 22,26 L 10,26 A 2,2 0 0 1 8,24 Z" fill="none" stroke="#FF9900" stroke-width="1.5"/>
      <ellipse cx="16" cy="10" rx="8" ry="3" fill="#FF9900" opacity="0.4"/>
      <text x="16" y="36" fill="#FFFFFF" font-family="Arial" font-size="7" font-weight="bold" text-anchor="middle">S3</text>
    </g>

    <!-- CloudFront Icon -->
    <g transform="translate(145, 80)">
      <rect width="32" height="32" rx="6" fill="#1E293B" stroke="#FF9900" stroke-width="1.5"/>
      <!-- Globe and Arrows -->
      <circle cx="16" cy="16" r="10" fill="none" stroke="#FF9900" stroke-width="1.5"/>
      <path d="M 6,16 L 26,16" stroke="#FF9900" stroke-width="1"/>
      <path d="M 16,6 C 20,10 20,22 16,26 C 12,22 12,10 16,6 Z" fill="none" stroke="#FF9900" stroke-width="1"/>
      <text x="16" y="36" fill="#FFFFFF" font-family="Arial" font-size="7" font-weight="bold" text-anchor="middle">CF</text>
    </g>

    <!-- AWS Cloud Logo -->
    <text x="135" y="135" fill="#FFFFFF" font-family="Poppins, sans-serif" font-size="12" font-weight="extrabold" text-anchor="middle">AWS INFRASTRUCTURE</text>
  </g>

  <!-- Route 53 Connection (Top center) -->
  <g transform="translate(265, 45)" filter="url(#shadow)">
    <rect width="70" height="24" rx="12" fill="#1E293B" stroke="#38BDF8" stroke-width="1.5"/>
    <text x="35" y="15" fill="#38BDF8" font-family="Poppins, sans-serif" font-size="8" font-weight="bold" text-anchor="middle">DNS / Route 53</text>
  </g>

  <path d="M 300,70 L 300,120" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="3 3"/>
</svg>
