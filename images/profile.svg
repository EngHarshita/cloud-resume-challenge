<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <!-- Cloud Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="20"/>

  <!-- Rotating Orbit Rings (Visual representation of Cloud) -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="10 15" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="40 10 20 15" />

  <!-- Background Decorative Code Particles -->
  <text x="50" y="100" fill="#38BDF8" opacity="0.15" font-family="Courier, monospace" font-size="16" font-weight="bold">&lt;code&gt;</text>
  <text x="300" y="120" fill="#6366F1" opacity="0.2" font-family="Courier, monospace" font-size="14" font-weight="bold">{ public }</text>
  <text x="60" y="300" fill="#6366F1" opacity="0.15" font-family="Courier, monospace" font-size="14" font-weight="bold">@Autowired</text>
  <text x="280" y="320" fill="#38BDF8" opacity="0.25" font-family="Courier, monospace" font-size="18" font-weight="bold">AWS Cloud</text>

  <!-- Glowing Aura behind avatar -->
  <circle cx="200" cy="200" r="90" fill="url(#accentGrad)" opacity="0.25" filter="url(#glow)"/>

  <!-- Avatar Inner Circle -->
  <circle cx="200" cy="200" r="85" fill="#1E293B" stroke="url(#accentGrad)" stroke-width="3" />

  <!-- Developer Icon / Avatar Illustration -->
  <g transform="translate(135, 125)">
    <!-- Laptop screen representation -->
    <rect x="25" y="65" width="80" height="50" rx="4" fill="#0F172A" stroke="#38BDF8" stroke-width="2" />
    <!-- Laptop Keyboard base -->
    <polygon points="15,115 115,115 125,125 5,125" fill="#1E293B" stroke="#38BDF8" stroke-width="2" />
    <line x1="45" y1="121" x2="85" y2="121" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"/>

    <!-- Developer Character Body -->
    <path d="M35,90 C35,60 95,60 95,90 Z" fill="#6366F1" opacity="0.45"/>
    <!-- Head -->
    <circle cx="65" cy="45" r="20" fill="#E2E8F0" />
    <!-- Hair -->
    <path d="M45,45 C45,25 85,25 85,45 C80,35 50,35 45,45 Z" fill="#0F172A" />
    <!-- Glasses -->
    <rect x="52" y="41" width="10" height="6" rx="1" fill="none" stroke="#0F172A" stroke-width="1.5" />
    <rect x="68" y="41" width="10" height="6" rx="1" fill="none" stroke="#0F172A" stroke-width="1.5" />
    <line x1="62" y1="44" x2="68" y2="44" stroke="#0F172A" stroke-width="1.5" />

    <!-- Code symbols inside laptop screen -->
    <text x="35" y="95" fill="#38BDF8" font-family="Courier, monospace" font-size="12" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Small AWS Logo badge over avatar -->
  <g transform="translate(255, 235)">
    <circle cx="20" cy="20" r="22" fill="#0F172A" stroke="#38BDF8" stroke-width="2" />
    <!-- AWS letter outline -->
    <text x="20" y="24" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="black" text-anchor="middle">AWS</text>
    <path d="M10,28 Q20,33 30,28" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round"/>
    <path d="M29,28 L32,25 L30,30 Z" fill="#FF9900"/>
  </g>

  <!-- Border Frame -->
  <rect x="5" y="5" width="390" height="390" rx="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
</svg>
